<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>War.v2 - WW1 Battlefield Simulator</title>
    <style>
      html, body, #game { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #1c211f; font-family: system-ui, sans-serif; }
      #overlay { position: fixed; left: 16px; bottom: 16px; z-index: 2; color: #f4efe0; background: rgba(20, 18, 14, .72); border: 1px solid rgba(255,255,255,.16); border-radius: 12px; padding: 12px 14px; max-width: 430px; }
      #overlay h1 { font-size: 18px; margin: 0 0 6px; }
      #overlay p { margin: 4px 0; font-size: 13px; line-height: 1.35; }
      canvas { width: 100% !important; height: 100% !important; display: block; }
    </style>
  </head>
  <body>
    <div id="game"><canvas id="bevy"></canvas></div>
    <aside id="overlay">
      <h1>War.v2 Command Post</h1>
      <p><strong>1/2</strong> select Entente/Central groups. <strong>Arrow keys</strong> issue movement commands. <strong>WASD</strong> pans the observer camera.</p>
      <p>Low-poly infantry advance through trenches while ballistic fire produces smoke, dust, morale loss, and battlefield chaos.</p>
    </aside>
    <script type="module">
      import init from './war_v2.js';
      init();
    </script>
  </body>
</html>
