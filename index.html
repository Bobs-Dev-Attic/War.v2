<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>War.v2 — WWI Battle Setup</title>
    <style>
      :root {
        --ink: #2b2a24;
        --parchment: #e8e0cc;
        --parchment-2: #ddd3b8;
        --khaki: #6b6540;
        --khaki-dark: #4a4530;
        --accent: #8a5a2b;
        --line: #c3b895;
      }
      * { box-sizing: border-box; }
      /* `hidden` must win over the explicit display rules below. */
      [hidden] { display: none !important; }
      html, body {
        margin: 0; padding: 0; height: 100%;
        background: #0f1729;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        color: var(--ink);
        overflow: hidden;
      }
      /* ---- Setup page ---- */
      #setup {
        position: fixed; inset: 0;
        display: flex; align-items: center; justify-content: center;
        padding: 20px;
        background:
          radial-gradient(1200px 600px at 50% -10%, #3a4256, #0f1729 60%);
        overflow: auto;
      }
      .panel {
        width: min(920px, 100%);
        background: var(--parchment);
        border: 1px solid var(--line);
        border-radius: 12px;
        box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        overflow: hidden;
      }
      header.hd {
        padding: 18px 24px;
        background: linear-gradient(var(--khaki), var(--khaki-dark));
        color: #f3eeda;
        border-bottom: 2px solid var(--khaki-dark);
      }
      header.hd h1 { margin: 0; font-size: 1.5rem; letter-spacing: 0.02em; }
      header.hd p { margin: 4px 0 0; font-size: 0.9rem; opacity: 0.85; }
      .tabs { display: flex; gap: 2px; background: var(--parchment-2); padding: 0 12px; border-bottom: 1px solid var(--line); }
      .tab {
        appearance: none; border: 0; background: transparent;
        padding: 12px 18px; font-size: 0.95rem; font-weight: 600; color: var(--khaki-dark);
        cursor: pointer; border-bottom: 3px solid transparent; opacity: 0.7;
      }
      .tab[aria-selected="true"] { opacity: 1; border-bottom-color: var(--accent); }
      .body { padding: 22px 24px; min-height: 320px; }
      .tabpanel[hidden] { display: none; }
      h2.section { margin: 4px 0 12px; font-size: 1.05rem; color: var(--khaki-dark); }
      .grid {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 12px; margin-bottom: 22px;
      }
      .card, .chip {
        border: 1px solid var(--line); border-radius: 9px; background: #f3eeda;
        cursor: pointer; transition: transform 0.06s ease, border-color 0.1s;
      }
      .card { padding: 12px 14px; }
      .card h3 { margin: 0 0 4px; font-size: 0.98rem; }
      .card p { margin: 0; font-size: 0.8rem; color: #6a6449; line-height: 1.3; }
      .card[aria-pressed="true"], .chip[aria-pressed="true"] {
        border-color: var(--accent); outline: 2px solid var(--accent);
        background: #fbf6e6;
      }
      .chips { display: flex; flex-wrap: wrap; gap: 10px; }
      .chip { padding: 10px 16px; font-size: 0.95rem; font-weight: 600; display: flex; align-items: center; gap: 8px; }
      .chip .ico { font-size: 1.15rem; }
      .deploy { display: flex; gap: 20px; flex-wrap: wrap; }
      .deploy-map { flex: 0 0 auto; }
      #minimap {
        border: 1px solid var(--line); border-radius: 8px; background: #cdbf98;
        cursor: crosshair; display: block; max-width: 100%;
      }
      .hint { margin: 8px 2px 0; font-size: 0.78rem; color: #6a6449; }
      .deploy-controls { flex: 1 1 240px; min-width: 220px; }
      .side-toggle { display: flex; gap: 6px; margin-bottom: 12px; }
      .side-toggle button {
        flex: 1; appearance: none; border: 1px solid var(--line); background: #f3eeda;
        padding: 9px; border-radius: 8px; font-weight: 600; cursor: pointer; color: var(--khaki-dark);
      }
      .side-toggle button[aria-pressed="true"] { border-color: var(--accent); outline: 2px solid var(--accent); background: #fbf6e6; }
      .budget { font-size: 0.9rem; margin-bottom: 10px; }
      .budget .bar { height: 8px; border-radius: 4px; background: #cdbf98; overflow: hidden; margin-top: 4px; }
      .budget .bar > div { height: 100%; background: var(--accent); }
      .unit-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 12px; }
      .unit-btn {
        display: flex; align-items: center; justify-content: space-between;
        border: 1px solid var(--line); background: #f3eeda; border-radius: 8px;
        padding: 8px 12px; cursor: pointer; font-size: 0.9rem;
      }
      .unit-btn[aria-pressed="true"] { border-color: var(--accent); outline: 2px solid var(--accent); background: #fbf6e6; }
      .unit-btn .dot { width: 12px; height: 12px; border-radius: 50%; display: inline-block; margin-right: 8px; }
      .unit-btn .cost { color: #6a6449; font-variant-numeric: tabular-nums; }
      .unit-btn .placed { color: var(--khaki-dark); font-weight: 700; font-variant-numeric: tabular-nums; }
      .clear {
        appearance: none; border: 1px solid var(--line); background: #efe4cf; color: var(--khaki-dark);
        padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
      }
      footer.ft {
        display: flex; align-items: center; justify-content: space-between;
        padding: 16px 24px; border-top: 1px solid var(--line); background: var(--parchment-2);
        gap: 12px; flex-wrap: wrap;
      }
      .summary { font-size: 0.9rem; color: var(--khaki-dark); }
      .summary b { color: var(--ink); }
      .start {
        appearance: none; border: 0; border-radius: 9px; cursor: pointer;
        padding: 12px 22px; font-size: 1rem; font-weight: 700; color: #f7f2e2;
        background: linear-gradient(var(--accent), #6f461f);
        box-shadow: 0 4px 0 #5a3818;
      }
      .start:active { transform: translateY(2px); box-shadow: 0 2px 0 #5a3818; }
      /* ---- Battle canvas ---- */
      #bevy-canvas { display: block; width: 100vw; height: 100vh; touch-action: none; outline: none; }
      #loading {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        color: #9fb4d4; font-size: 1.1rem; letter-spacing: 0.02em; pointer-events: none;
        transition: opacity 0.4s ease; background: #0f1729;
      }
    </style>
  </head>
  <body>
    <div id="setup">
      <div class="panel">
        <header class="hd">
          <h1>War.v2 — WWI Battle Setup</h1>
          <p>Choose the ground and the weather, then take the field.</p>
        </header>

        <div class="tabs" role="tablist">
          <button class="tab" role="tab" aria-selected="true" data-tab="terrain">1 · Location &amp; Weather</button>
          <button class="tab" role="tab" aria-selected="false" data-tab="deploy">2 · Deploy</button>
        </div>

        <div class="body">
          <section class="tabpanel" data-panel="terrain">
            <h2 class="section">Location</h2>
            <div class="grid" id="locations"></div>
            <h2 class="section">Weather</h2>
            <div class="chips" id="weathers"></div>
          </section>

          <section class="tabpanel" data-panel="deploy" hidden>
            <div class="deploy">
              <div class="deploy-map">
                <canvas id="minimap" width="440" height="500"></canvas>
                <p class="hint">Left-click your half to place · right-click to remove · both sides are yours to position.</p>
              </div>
              <div class="deploy-controls">
                <div class="side-toggle" id="sideToggle">
                  <button type="button" data-side="b" aria-pressed="true">British (south)</button>
                  <button type="button" data-side="c" aria-pressed="false">Central (north)</button>
                </div>
                <div class="budget" id="budget"></div>
                <div class="unit-list" id="unitList"></div>
                <button type="button" class="clear" id="clearSide">Clear this side</button>
              </div>
            </div>
          </section>
        </div>

        <footer class="ft">
          <div class="summary" id="summary"></div>
          <button class="start" id="start">Start Battle ▶</button>
        </footer>
      </div>
    </div>

    <canvas id="bevy-canvas" hidden></canvas>
    <div id="loading" hidden>Deploying to the front (loading WebAssembly)…</div>

    <script type="module">
      const LOCATIONS = [
        { id: "somme",     name: "The Somme (1916)",   blurb: "Chalky mud and shell-holes on the Western Front." },
        { id: "ypres",     name: "Ypres / Flanders",   blurb: "Waterlogged clay and flooded craters in Belgium." },
        { id: "gallipoli", name: "Gallipoli (1915)",   blurb: "Arid coastal scrub and ridges — the Ottoman front." },
        { id: "sinai",     name: "Sinai & Palestine",  blurb: "Open desert sand and dunes." },
        { id: "verdun",    name: "Verdun",             blurb: "Shell-torn forested hills." },
      ];
      const WEATHERS = [
        { id: "clear",    name: "Clear",    ico: "☀" },
        { id: "overcast", name: "Overcast", ico: "☁" },
        { id: "rain",     name: "Rain",     ico: "🌧" },
        { id: "fog",      name: "Fog",      ico: "🌫" },
        { id: "snow",     name: "Snow",     ico: "❄" },
      ];

      let sel = { location: "somme", weather: "overcast" };
      let deployReady = false; // set once the mini-map is initialised

      const locWrap = document.getElementById("locations");
      LOCATIONS.forEach((l) => {
        const b = document.createElement("button");
        b.className = "card"; b.type = "button"; b.dataset.id = l.id;
        b.setAttribute("aria-pressed", String(l.id === sel.location));
        b.innerHTML = `<h3>${l.name}</h3><p>${l.blurb}</p>`;
        b.onclick = () => { sel.location = l.id; refresh(); };
        locWrap.appendChild(b);
      });

      const wxWrap = document.getElementById("weathers");
      WEATHERS.forEach((w) => {
        const b = document.createElement("button");
        b.className = "chip"; b.type = "button"; b.dataset.id = w.id;
        b.setAttribute("aria-pressed", String(w.id === sel.weather));
        b.innerHTML = `<span class="ico">${w.ico}</span>${w.name}`;
        b.onclick = () => { sel.weather = w.id; refresh(); };
        wxWrap.appendChild(b);
      });

      function refresh() {
        for (const el of locWrap.children) el.setAttribute("aria-pressed", String(el.dataset.id === sel.location));
        for (const el of wxWrap.children) el.setAttribute("aria-pressed", String(el.dataset.id === sel.weather));
        const l = LOCATIONS.find((x) => x.id === sel.location).name;
        const w = WEATHERS.find((x) => x.id === sel.weather).name;
        document.getElementById("summary").innerHTML = `Battlefield: <b>${l}</b> · Weather: <b>${w}</b>`;
        if (deployReady) drawMap();
      }
      refresh();

      // Tabs.
      for (const tab of document.querySelectorAll(".tab")) {
        tab.onclick = () => {
          for (const t of document.querySelectorAll(".tab")) t.setAttribute("aria-selected", String(t === tab));
          for (const p of document.querySelectorAll(".tabpanel")) p.hidden = p.dataset.panel !== tab.dataset.tab;
        };
      }

      // ---- Deploy mini-map ----
      const MM = { W: 440, H: 500, FX: 40, FZ: 46 };
      const UNITS_DEF = [
        { id: "inf", name: "Infantry", cost: 1, r: 3 },
        { id: "sni", name: "Sniper", cost: 3, r: 3 },
        { id: "mg", name: "Machine Gun", cost: 4, r: 4 },
        { id: "art", name: "Artillery", cost: 8, r: 5 },
        { id: "run", name: "Runner", cost: 1, r: 3 },
        { id: "sco", name: "Scout", cost: 2, r: 3 },
      ];
      const BUDGET = 60;
      const FAC_COLOR = { b: "#c8b463", c: "#889176" };
      const LOC_TINT = { somme: "#4d4633", ypres: "#414734", gallipoli: "#8a7346", sinai: "#a8905c", verdun: "#464331" };
      let placeSide = "b", placeType = "inf";
      let placed = [];

      const cvs = document.getElementById("minimap");
      const ctx = cvs.getContext("2d");
      const w2c = (x, z) => [((x + MM.FX) / (2 * MM.FX)) * MM.W, ((MM.FZ - z) / (2 * MM.FZ)) * MM.H];
      const c2w = (cx, cy) => [(cx / MM.W) * 2 * MM.FX - MM.FX, MM.FZ - (cy / MM.H) * 2 * MM.FZ];
      const costOf = (id) => UNITS_DEF.find((u) => u.id === id).cost;
      const spent = (s) => placed.filter((p) => p.side === s).reduce((a, p) => a + costOf(p.type), 0);
      const remaining = (s) => BUDGET - spent(s);

      function drawMap() {
        ctx.fillStyle = LOC_TINT[sel.location] || "#5a5238";
        ctx.fillRect(0, 0, MM.W, MM.H);
        const mid = w2c(0, 0)[1];
        ctx.fillStyle = "rgba(80,92,70,0.20)"; ctx.fillRect(0, 0, MM.W, mid);
        ctx.fillStyle = "rgba(160,146,92,0.20)"; ctx.fillRect(0, mid, MM.W, MM.H - mid);
        const z1 = w2c(0, 9)[1], z2 = w2c(0, -9)[1];
        ctx.fillStyle = "rgba(18,16,12,0.38)"; ctx.fillRect(0, z1, MM.W, z2 - z1);
        ctx.strokeStyle = "rgba(232,222,182,0.75)"; ctx.setLineDash([6, 4]); ctx.lineWidth = 2;
        for (const z of [12, -12]) { const y = w2c(0, z)[1]; ctx.beginPath(); ctx.moveTo(6, y); ctx.lineTo(MM.W - 6, y); ctx.stroke(); }
        ctx.setLineDash([]);
        ctx.fillStyle = "rgba(255,255,255,0.8)"; ctx.font = "600 12px system-ui";
        ctx.fillText("Central Powers (north)", 10, 18);
        ctx.fillText("British (south)", 10, MM.H - 9);
        for (const p of placed) {
          const [cx, cy] = w2c(p.x, p.z);
          const u = UNITS_DEF.find((x) => x.id === p.type);
          ctx.fillStyle = FAC_COLOR[p.side];
          ctx.strokeStyle = "rgba(0,0,0,0.55)"; ctx.lineWidth = 1;
          ctx.beginPath(); ctx.arc(cx, cy, u.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
          if (p.type === "art" || p.type === "mg") { ctx.fillStyle = "rgba(0,0,0,0.65)"; ctx.fillRect(cx - 1, cy - 1, 2, 2); }
        }
      }

      function buildUnitList() {
        const el = document.getElementById("unitList");
        el.innerHTML = "";
        for (const u of UNITS_DEF) {
          const b = document.createElement("button");
          b.className = "unit-btn"; b.type = "button"; b.dataset.id = u.id;
          b.setAttribute("aria-pressed", String(u.id === placeType));
          b.innerHTML =
            `<span><span class="dot" style="background:${FAC_COLOR[placeSide]}"></span>${u.name}</span>` +
            `<span><span class="placed" data-c="${u.id}">0</span> &middot; <span class="cost">${u.cost} pt${u.cost > 1 ? "s" : ""}</span></span>`;
          b.onclick = () => { placeType = u.id; buildUnitList(); };
          el.appendChild(b);
        }
        updateDeploy();
      }

      function updateDeploy() {
        const r = remaining(placeSide);
        document.getElementById("budget").innerHTML =
          `<b>${placeSide === "b" ? "British" : "Central"}</b> budget: ${r} / ${BUDGET} pts` +
          `<div class="bar"><div style="width:${Math.max(0, r) / BUDGET * 100}%"></div></div>`;
        for (const u of UNITS_DEF) {
          const n = placed.filter((p) => p.side === placeSide && p.type === u.id).length;
          const span = document.querySelector(`.placed[data-c="${u.id}"]`);
          if (span) span.textContent = n;
        }
      }

      function canvasToWorld(e) {
        const rect = cvs.getBoundingClientRect();
        const cx = (e.clientX - rect.left) * cvs.width / rect.width;
        const cy = (e.clientY - rect.top) * cvs.height / rect.height;
        return c2w(cx, cy);
      }

      cvs.addEventListener("click", (e) => {
        let [wx, wz] = canvasToWorld(e);
        wx = Math.max(-38, Math.min(38, wx));
        const ok = placeSide === "b" ? wz <= -3 && wz >= -45 : wz >= 3 && wz <= 45;
        if (!ok || remaining(placeSide) < costOf(placeType)) { cvs.animate([{ filter: "brightness(1.4)" }, { filter: "brightness(1)" }], 180); return; }
        placed.push({ side: placeSide, type: placeType, x: +wx.toFixed(2), z: +wz.toFixed(2) });
        drawMap(); updateDeploy();
      });
      cvs.addEventListener("contextmenu", (e) => {
        e.preventDefault();
        const [wx, wz] = canvasToWorld(e);
        let bi = -1, bd = 1e9;
        placed.forEach((p, i) => { const d = (p.x - wx) ** 2 + (p.z - wz) ** 2; if (d < bd) { bd = d; bi = i; } });
        if (bi >= 0 && bd < 12) { placed.splice(bi, 1); drawMap(); updateDeploy(); }
      });

      document.getElementById("sideToggle").addEventListener("click", (e) => {
        const b = e.target.closest("button"); if (!b) return;
        placeSide = b.dataset.side;
        for (const x of e.currentTarget.children) x.setAttribute("aria-pressed", String(x === b));
        buildUnitList(); drawMap();
      });
      document.getElementById("clearSide").onclick = () => {
        placed = placed.filter((p) => p.side !== placeSide);
        drawMap(); updateDeploy();
      };

      buildUnitList(); drawMap();
      deployReady = true;

      // Start: hand config to wasm, then boot the battle.
      document.getElementById("start").onclick = async () => {
        window.__WAR_LOCATION = sel.location;
        window.__WAR_WEATHER = sel.weather;
        window.__WAR_UNITS = placed.map((p) => `${p.side}:${p.type}:${p.x}:${p.z}`).join(",");
        document.getElementById("setup").remove();
        const canvas = document.getElementById("bevy-canvas");
        const loading = document.getElementById("loading");
        canvas.hidden = false; loading.hidden = false;
        const dropLoader = () => { loading.style.opacity = "0"; setTimeout(() => loading.remove(), 500); };
        setTimeout(dropLoader, 8000);
        try {
          const { default: init } = await import("./war_v2.js");
          await init();
          dropLoader();
        } catch (err) {
          loading.textContent = "Failed to start the battle — see the console.";
          loading.style.color = "#ff8080";
          console.error(err);
        }
      };
    </script>
  </body>
</html>
